<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>toma mi niña preciosa aun que sea tarde 💛</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to top, #fff8dc, #ffe066);
  font-family: Arial;
  overflow: hidden;
}

h1 {
  position: absolute;
  top: 40px;
  color: #a67c00;
}

/* RAMO */
.ramo {
  position: relative;
  width: 200px;
  height: 300px;
}

/* TALLOS */
.tallo {
  position: absolute;
  width: 6px;
  height: 150px;
  background: green;
  bottom: 0;
  left: 50%;
  transform-origin: bottom;
}

/* FLORES */
.flor {
  position: absolute;
  width: 60px;
  height: 60px;
  animation: flotar 3s infinite ease-in-out;
}

.petalo {
  width: 25px;
  height: 25px;
  background: yellow;
  border-radius: 50%;
  position: absolute;
}

.petalo:nth-child(1) { top: 0; left: 17px; }
.petalo:nth-child(2) { top: 17px; left: 0; }
.petalo:nth-child(3) { top: 17px; right: 0; }
.petalo:nth-child(4) { bottom: 0; left: 17px; }

.centro {
  width: 25px;
  height: 25px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: 17px;
  left: 17px;
}

/* POSICIONES */
.f1 { top: 0; left: 20px; }
.f2 { top: 20px; left: 80px; }
.f3 { top: 40px; left: 0; }

/* ANIMACIÓN */
@keyframes flotar {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

p {
  position: absolute;
  bottom: 40px;
  color: #7a5c00;
  text-align: center;
}
</style>
</head>

<body>

<h1>para la personita que me alegra los dias <3🌼</h1>

<div class="ramo">

  <div class="tallo" style="transform: rotate(-10deg);"></div>
  <div class="tallo" style="transform: rotate(10deg);"></div>
  <div class="tallo"></div>

  <div class="flor f1">
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="centro"></div>
  </div>

  <div class="flor f2">
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="centro"></div>
  </div>

  <div class="flor f3">
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="petalo"></div>
    <div class="centro"></div>
  </div>

</div>

<p>Estas flores son para vos 🌼💛</p>

</body>
</html>
