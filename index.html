<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>for my wife <3 💛 </title>
<style>
  body {
    background: linear-gradient(to top, #fff8dc, #ffe066);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    font-family: Arial, sans-serif;
  }

  h1 {
    color: #a67c00;
    margin-bottom: 30px;
  }

  .flor {
    position: relative;
    width: 100px;
    height: 100px;
  }

  .petalo {
    width: 40px;
    height: 40px;
    background: yellow;
    border-radius: 50%;
    position: absolute;
  }

  .petalo:nth-child(1) { top: 0; left: 30px; }
  .petalo:nth-child(2) { top: 30px; left: 0; }
  .petalo:nth-child(3) { top: 30px; right: 0; }
  .petalo:nth-child(4) { bottom: 0; left: 30px; }

  .centro {
    width: 40px;
    height: 40px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: 30px;
    left: 30px;
  }
</style>
</head>
<body>

<h1>toma mi niña preciosa, perdon que lo hice tarde 💛</h1>

<div class="flor">
  <div class="petalo"></div>
  <div class="petalo"></div>
  <div class="petalo"></div>
  <div class="petalo"></div>
  <div class="centro"></div>
</div>

<p>para la personita que me alegra los dias <3🌼</p>

</body>
</html>
