<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Rachel 💛</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to top, #fff8dc, #ffe066);
  font-family: Arial;
  overflow: hidden;
}

h1 {
  position: absolute;
  top: 30px;
  color: #a67c00;
}

p {
  position: absolute;
  bottom: 30px;
  color: #7a5c00;
}

/* RAMO */
.ramo {
  position: relative;
  width: 200px;
  height: 300px;
}

/* TALLOS */
.tallo {
  position: absolute;
  width: 6px;
  height: 150px;
  background: green;
  bottom: 0;
  left: 50%;
  transform-origin: bottom;
}

/* FLOR */
.flor {
  position: absolute;
  width: 60px;
  height: 60px;
  animation: flotar 3s infinite ease-in-out;
}

/* CENTRO */
.centro {
  position: absolute;
  width: 20px;
  height: 20px;
  background: orange;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}

/* PETALOS (AHORA BIEN POSICIONADOS) */
.petalo {
  position: absolute;
  width: 20px;
  height: 20px;
  background: yellow;
  border-radius: 50%;
}

/* alrededor del centro */
.p1 { top: 0; left: 50%; transform: translateX(-50%); }
.p2 { bottom: 0; left: 50%; transform: translateX(-50%); }
.p3 { left: 0; top: 50%; transform: translateY(-50%); }
.p4 { right: 0; top: 50%; transform: translateY(-50%); }

.p5 { top: 10%; left: 10%; }
.p6 { top: 10%; right: 10%; }
.p7 { bottom: 10%; left: 10%; }
.p8 { bottom: 10%; right: 10%; }

/* POSICIONES FLORES */
.f1 { top: 0; left: 20px; }
.f2 { top: 20px; left: 80px; }
.f3 { top: 40px; left: 0; }

/* ANIMACION */
@keyframes flotar {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* PETALOS CAYENDO */
.petalo-caida {
  position: absolute;
  width: 8px;
  height: 8px;
  background: yellow;
  border-radius: 50%;
  animation: caer linear infinite;
}

@keyframes caer {
  0% { transform: translateY(-100px); opacity: 0; }
  100% { transform: translateY(100vh); opacity: 1; }
}
</style>
</head>

<body>

<h1>Para Rachel 💛</h1>

<div class="ramo">
  <div class="tallo" style="transform: rotate(-10deg);"></div>
  <div class="tallo" style="transform: rotate(10deg);"></div>
  <div class="tallo"></div>

  <div class="flor f1">
    <div class="petalo p1"></div>
    <div class="petalo p2"></div>
    <div class="petalo p3"></div>
    <div class="petalo p4"></div>
    <div class="petalo p5"></div>
    <div class="petalo p6"></div>
    <div class="petalo p7"></div>
    <div class="petalo p8"></div>
    <div class="centro"></div>
  </div>

  <div class="flor f2">
    <div class="petalo p1"></div>
    <div class="petalo p2"></div>
    <div class="petalo p3"></div>
    <div class="petalo p4"></div>
    <div class="petalo p5"></div>
    <div class="petalo p6"></div>
    <div class="petalo p7"></div>
    <div class="petalo p8"></div>
    <div class="centro"></div>
  </div>

  <div class="flor f3">
    <div class="petalo p1"></div>
    <div class="petalo p2"></div>
    <div class="petalo p3"></div>
    <div class="petalo p4"></div>
    <div class="petalo p5"></div>
    <div class="petalo p6"></div>
    <div class="petalo p7"></div>
    <div class="petalo p8"></div>
    <div class="centro"></div>
  </div>
</div>

<p>Estas flores son para vos 🌼💛</p>

<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b4f7c6b7.mp3?filename=soft-piano-ambient-110624.mp3" type="audio/mpeg">
</audio>

<script>
for (let i = 0; i < 25; i++) {
  let p = document.createElement("div");
  p.className = "petalo-caida";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
